<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Glitched Arena</title>
    <link rel="icon" href="data:,">
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas { box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); }
    </style>
</head>
<body>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
<script async src="https://tganalytics.xyz/index.js" onload="initAnalytics()" type="text/javascript"></script>
<script src="game/01-config.js"></script>
<script src="game/02-state.js"></script>
<script src="game/03-utils.js"></script>
<script src="game/04-combat.js"></script>
<script src="game/05-effects.js"></script>
<script src="game/06-ui.js"></script>
<script src="game/07-scenes.js"></script>
<script src="game/08-main.js"></script>

<script>
    function initAnalytics() {
        if (window.telegramAnalytics) {
            window.telegramAnalytics.init({
                token: 'YOUR_ANALYTICS_TOKEN',
                appName: 'glitched_arena',
            });
            console.log("✅ Telegram Analytics ready");
        }
    }

    window.addEventListener('load', () => {
        if (window.Adsgram && window.Telegram?.WebApp?.initData) {
            try {
                window.adController = window.Adsgram.init({ blockId: "25945" });
                console.log("✅ Adsgram ready:", window.adController);
            } catch (e) {
                console.log("Adsgram init error:", e);
                window.adController = null;
            }
        } else {
            console.warn("❌ Adsgram SDK not found or not in Telegram!");
            window.adController = null;
        }
    });
</script>

</body>
</html>
