server {
    listen 80;
    server_name glitched-arena.myftp.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name glitched-arena.myftp.org;

    ssl_certificate /etc/letsencrypt/live/glitched-arena.myftp.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/glitched-arena.myftp.org/privkey.pem;

    root /var/www/glitched-arena;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/(get_invoice|submit_score|get_leaderboard|get_user_personal|check_community|log_metric) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /math/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
